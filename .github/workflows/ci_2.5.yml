name: Atividade 2.5 - Multiplos Jobs

on:
  push:

jobs:
  job-1:
    name: Checkout e Informacoes basicas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Exibir data e hora
        run: date

      - name: Exibir versao do Git
        run: git --version

  job-2:
    name: Validar organizacao do projeto
    runs-on: ubuntu-latest
    needs: job-1
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verificar README.md
        run: test -f README.md

      - name: Verificar LICENSE
        run: test -f LICENSE

      - name: Verificar .gitignore
        run: test -f .gitignore