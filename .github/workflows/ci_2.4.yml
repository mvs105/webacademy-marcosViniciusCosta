name: Atividade 2.4 - Validando Repositorio

on:
  push:

jobs:
  validar-arquivos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verificar se README.md existe
        run: test -f README.md

      - name: Verificar se LICENSE existe
        run: test -f LICENSE

      - name: Verificar se .gitignore existe
        run: test -f .gitignore